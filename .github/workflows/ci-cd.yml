name: CI/CD – Churn Prediction MLOps

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: churn-prediction-api

jobs:
  # ─── 1. Lint ───────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Run ruff linter
        run: ruff check . --select=E,W,F --ignore=E501 --exclude=notebooks
        # E501 = line-too-long (relaxed for ML code)

  # ─── 2. Test ───────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=50

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ─── 3. Train Model ────────────────────────────────────────────────────────
  train:
    name: Train & Validate Model
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python train.py --data data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv

      - name: Validate model artifacts and quality gates
        run: |
          python - <<'EOF'
          import json, sys
          from pathlib import Path

          required = [
              "models/churn_model_latest.joblib",
              "models/preprocessor.joblib",
              "models/metadata.json",
          ]
          for f in required:
              if not Path(f).exists():
                  print(f"MISSING: {f}", file=sys.stderr)
                  sys.exit(1)

          with open("models/metadata.json") as fh:
              meta = json.load(fh)

          m = meta["metrics"]
          roc    = m["roc_auc"]
          recall = m["recall"]
          brier  = m["brier_score"]
          cv_std = m.get("cv_roc_auc_std", 1.0)

          print(f"ROC-AUC   : {roc:.4f}   (gate >= 0.80)")
          print(f"Recall    : {recall:.4f}   (gate >= 0.70)")
          print(f"Brier     : {brier:.4f}   (gate <  0.20)")
          print(f"CV std    : {cv_std:.4f}   (gate <  0.03, stability)")

          failed = False
          if roc < 0.80:
              print(f"FAIL: ROC-AUC {roc:.4f} < 0.80", file=sys.stderr); failed = True
          if recall < 0.70:
              print(f"FAIL: Recall {recall:.4f} < 0.70", file=sys.stderr); failed = True
          if brier >= 0.20:
              print(f"FAIL: Brier {brier:.4f} >= 0.20 (poor calibration)", file=sys.stderr); failed = True
          if cv_std >= 0.03:
              print(f"WARN: CV std {cv_std:.4f} >= 0.03 (unstable)", file=sys.stderr)

          if failed:
              sys.exit(1)
          print("All quality gates passed ✓")
          EOF

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: models/

  # ─── 4. Build Docker Image ─────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: models/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the container
        run: |
          docker run -d --name churn-api -p 8000:8000 ${{ env.IMAGE_NAME }}:latest
          sleep 8
          curl -f http://localhost:8000/health || (docker logs churn-api && exit 1)
          docker stop churn-api

  # ─── 5. Deploy to Render ───────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret not set – skipping deploy."
            exit 0
          fi
          curl -X POST "$RENDER_DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error
          echo "Deploy triggered ✓"
